- q: "¿Solo trabajáis con startups?"
  a: "No. Trabajamos con startups, scaleups, SaaS, consultoras, profesionales y empresas ya consolidadas que quieren dar un salto en percepción."
- q: "¿Puedo contratar un único servicio?"
  a: "Sí. Aunque solemos trabajar desde una visión integral, cada servicio puede contratarse por separado si encaja con tu momento."
- q: "¿Cómo suele ser el proceso?"
  a: "Comienza con una conversación. A partir de ahí seguimos cinco fases: Descubrir, Comprender, Definir, Construir y Evolucionar."
- q: "¿Cuánto dura un proyecto?"
  a: "Depende del alcance. Un proyecto de branding suele durar entre 4 y 8 semanas; una web entre 6 y 12. Siempre acordamos un calendario claro antes de empezar."
- q: "¿Trabajáis en remoto?"
  a: "Sí. Colaboramos con clientes de toda España, Europa y LATAM. Reuniones estructuradas y comunicación asíncrona diaria."
- q: "¿Qué ocurre cuando termina el proyecto?"
  a: "Entregamos un sistema listo para crecer contigo y ofrecemos acompañamiento en las siguientes fases si lo necesitas."
