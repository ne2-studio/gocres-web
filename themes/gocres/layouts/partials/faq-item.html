<details class="faq group border-b border-border">
  <summary class="flex cursor-pointer list-none items-center justify-between gap-6 py-8">
    <span class="font-display text-xl text-foreground md:text-2xl">{{ .q }}</span>
    <span aria-hidden class="faq-icon flex h-9 w-9 shrink-0 items-center justify-center rounded-full border border-border text-foreground transition">+</span>
  </summary>
  <div class="pb-8 pr-16 text-muted-foreground">{{ .a }}</div>
</details>
