{{ define "main" }}
<section class="pt-24 md:pt-40">
  <div class="mx-auto max-w-3xl px-6 pb-24 md:px-10 md:pb-32">
    <p class="eyebrow text-muted-foreground">Legal</p>
    <h1 class="display-lg mt-6 text-foreground">{{ .Title }}</h1>
    <article class="mt-12 max-w-none text-foreground/85 [&>h1]:display-md [&>h1]:mt-10 [&>p]:mt-6">
      {{ .Content }}
    </article>
  </div>
</section>
{{ end }}
